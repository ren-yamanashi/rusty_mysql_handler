name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# cargo check / test are deterministic for this codebase (no
# cfg(target_*), no platform-specific deps), so 1 platform is enough.
# Multi-platform coverage lives in e2e.yml, which exercises the parts
# that genuinely differ across OS (.so / .dylib / .dll plugin loaders).

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: make lint

  check-test:
    name: Check & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: check-test
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Strip rust-toolchain.toml so the MSRV pin is honoured
        run: rm rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace --all-targets

  docs:
    name: Docs
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: docs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --no-deps

  quality:
    name: Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [lint, check-test, msrv, docs]
    if: ${{ always() }}
    steps:
      - name: Verify required jobs
        env:
          LINT: ${{ needs.lint.result }}
          CHECK_TEST: ${{ needs.check-test.result }}
          MSRV: ${{ needs.msrv.result }}
          DOCS: ${{ needs.docs.result }}
        run: |
          set -euo pipefail
          fail=0
          for entry in "lint=$LINT" "check-test=$CHECK_TEST" "msrv=$MSRV" "docs=$DOCS"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            echo "$name: $result"
            if [[ "$result" != "success" ]]; then fail=1; fi
          done
          exit "$fail"
