name: E2E

on:
  pull_request:
    paths:
      - 'src/**'
      - 'shim/**'
      - 'examples/**'
      - 'tests/e2e/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'shim/**'
      - 'examples/**'
      - 'tests/e2e/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    # arm64 stays continue-on-error until the maintainer runs
    # publish-mysql-base.yml on main and pins MYSQL_BASE_SHA256_ARM64 in
    # tests/e2e/Dockerfile. Drop the flag in the SHA-pin PR.
    continue-on-error: ${{ matrix.continue-on-error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            continue-on-error: false
          - runner: ubuntu-24.04-arm
            arch: arm64
            continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build plugin image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: tests/e2e/Dockerfile
          tags: rusty-mysql-handler-e2e:latest
          load: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Run smoke
        run: bash tests/e2e/run.sh
