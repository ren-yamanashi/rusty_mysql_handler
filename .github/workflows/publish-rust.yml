name: Publish Rust

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      confirm:
        description: Type `publish-rust` to continue
        required: true
        type: string
      auth_mode:
        description: Authentication mode for manual runs
        required: true
        default: trusted
        type: choice
        options:
          - trusted
          - token

permissions:
  contents: read

concurrency:
  group: publish-rust
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-gates:
    if: ${{ (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && inputs.confirm == 'publish-rust') }}
    name: Release Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'push'
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cargo_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "mysql-handler") | .version')"
          if [[ -z "$cargo_version" ]]; then
            echo "::error::no package named mysql-handler in cargo metadata"
            exit 1
          fi
          expected="v${cargo_version}"
          if [[ "$GIT_TAG" != "$expected" ]]; then
            echo "::error::tag $GIT_TAG does not match Cargo.toml version ($expected)"
            exit 1
          fi

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@8a45e1c7c9a95dfae3276e89a553705e40ae45a2 # v2.0.20
        with:
          command: check
          arguments: --workspace --all-features

      - name: cargo publish --dry-run
        run: cargo publish -p mysql-handler --dry-run

  publish:
    if: ${{ (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && inputs.confirm == 'publish-rust') }}
    name: Publish to crates.io
    needs: release-gates
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: release

      # OIDC trusted publishing is the default. Once trusted publishing is
      # configured for `mysql-handler` on crates.io, the tag-push path uses
      # this path and no `CARGO_REGISTRY_TOKEN` secret is required.
      - name: Exchange OIDC token for crates.io token
        if: ${{ github.event_name == 'push' || inputs.auth_mode == 'trusted' }}
        id: auth
        uses: rust-lang/crates-io-auth-action@e919bc7605cde86df457cf5b93c5e103838bd879 # v1.0.1

      - name: cargo publish (trusted publishing)
        if: ${{ github.event_name == 'push' || inputs.auth_mode == 'trusted' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p mysql-handler

      # Token-based publishing is kept as a fallback for the very first
      # publish (before trusted publishing can be configured) and for
      # disaster-recovery. Runs only via workflow_dispatch with the explicit
      # `auth_mode = token` choice.
      - name: cargo publish (token fallback)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.auth_mode == 'token' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mysql-handler
