name: Publish Rust

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      confirm:
        description: Type `publish-rust` to continue
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-rust
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    if: ${{ (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && inputs.confirm == 'publish-rust') }}
    name: cargo publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: crates-io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1

      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'push'
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cargo_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "mysql-handler") | .version')"
          expected="v${cargo_version}"
          if [[ "$GIT_TAG" != "$expected" ]]; then
            echo "::error::tag $GIT_TAG does not match Cargo.toml version ($expected)"
            exit 1
          fi

      - name: cargo publish --dry-run
        run: cargo publish -p mysql-handler --dry-run

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mysql-handler
