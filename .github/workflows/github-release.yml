name: GitHub Release

on:
  workflow_run:
    workflows:
      - Publish Rust
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.1.0)
        required: true
        type: string
      confirm:
        description: Type `github-release` to continue
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    # workflow_run only fires when Publish Rust succeeded on a tag (head_branch
    # is the tag name for tag pushes). The startsWith + contains check is
    # defense-in-depth on top of the regex below and the tag filter in
    # Publish Rust, so a branch like `vfoo` cannot slip through.
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'v') && contains(github.event.workflow_run.head_branch, '.') && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && inputs.confirm == 'github-release') }}
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || format('refs/tags/{0}', inputs.tag) }}

      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            tag="$WORKFLOW_RUN_HEAD_BRANCH"
          else
            tag="$INPUT_TAG"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::tag $tag is not a vX.Y.Z[-suffix] release tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes
