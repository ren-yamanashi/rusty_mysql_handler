# Categories for `gh release create --generate-notes`. PRs are bucketed by
# label; the labels used here mirror the Conventional Commits prefixes the
# project uses on PR titles, so a single source of truth (the PR title)
# drives both the changelog entry and its category.

changelog:
  categories:
    - title: ⚠ Breaking
      labels:
        - "breaking"
    - title: 🚀 Features
      labels:
        - "feat"
        - "feature"
    - title: 🐛 Fixes
      labels:
        - "fix"
    - title: 🛠 Refactors
      labels:
        - "refactor"
    - title: 📚 Docs
      labels:
        - "docs"
    - title: ⚙ Build & CI
      labels:
        - "build"
        - "ci"
        - "chore"
    - title: 🧪 Tests
      labels:
        - "test"
    - title: Other Changes
      labels:
        - "*"
