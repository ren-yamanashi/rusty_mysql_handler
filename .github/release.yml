# Categories for `gh release create --generate-notes`. PRs are bucketed by
# label; the labels used here mirror the Conventional Commits prefixes the
# project uses on PR titles. Labels are currently applied manually before
# tagging a release — a future labeler workflow could parse PR titles and
# apply the matching label automatically, but until then the maintainer
# needs to set the right label on each merged PR.

changelog:
  categories:
    - title: ⚠ Breaking
      labels:
        - "breaking"
    - title: 🚀 Features
      labels:
        - "feat"
        - "feature"
    - title: 🐛 Fixes
      labels:
        - "fix"
    - title: 🛠 Refactors
      labels:
        - "refactor"
    - title: 📚 Docs
      labels:
        - "docs"
    - title: ⚙ Build & CI
      labels:
        - "build"
        - "ci"
        - "chore"
    - title: 🧪 Tests
      labels:
        - "test"
    - title: Other Changes
      labels:
        - "*"
